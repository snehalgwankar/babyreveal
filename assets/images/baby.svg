<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F9DFA8"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9DFA8"/>
      <stop offset="100%" stop-color="#F2B44C"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- tiny stars -->
  <g fill="#F2B44C" opacity=".8">
    <circle cx="42" cy="46" r="2.4"/>
    <circle cx="160" cy="38" r="1.8"/>
    <circle cx="168" cy="120" r="2.2"/>
    <circle cx="30" cy="120" r="1.6"/>
    <path d="M140 62 l2.2 5 5 2.2 -5 2.2 -2.2 5 -2.2 -5 -5 -2.2 5 -2.2 Z"/>
    <path d="M55 78 l1.8 4 4 1.8 -4 1.8 -1.8 4 -1.8 -4 -4 -1.8 4 -1.8 Z"/>
  </g>

  <!-- crescent moon -->
  <path d="M60 152 A62 62 0 0 1 60 76 A50 50 0 0 0 60 152 Z"
        transform="rotate(-38 100 118) translate(28 18)" fill="url(#moon)"
        stroke="#E8A83C" stroke-width="2"/>
  <path d="M52 148 Q100 176 150 140 Q120 168 84 164 Q64 160 52 148 Z" fill="url(#moon)" stroke="#E8A83C" stroke-width="2"/>

  <!-- sleeping baby -->
  <g>
    <!-- swaddle -->
    <ellipse cx="102" cy="128" rx="34" ry="24" fill="#F7C6D0"/>
    <path d="M72 122 Q102 108 132 122 Q104 132 72 122 Z" fill="#EFB4C2"/>
    <!-- head -->
    <circle cx="102" cy="98" r="22" fill="#F5D3AE"/>
    <!-- hair curl -->
    <path d="M100 76 q6 -8 12 -2 q-8 -2 -8 6" fill="none" stroke="#C98A5B" stroke-width="3" stroke-linecap="round"/>
    <!-- closed eyes -->
    <path d="M92 98 q4 3 8 0" stroke="#8A6248" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M106 98 q4 3 8 0" stroke="#8A6248" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="88" cy="105" r="4" fill="#F2A7B8" opacity=".7"/>
    <circle cx="116" cy="105" r="4" fill="#F2A7B8" opacity=".7"/>
    <!-- smile -->
    <path d="M98 109 q4 3.5 8 0" stroke="#8A6248" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- zzz -->
  <g fill="#8A7690" font-family="Georgia, serif" font-weight="bold">
    <text x="136" y="80" font-size="14">z</text>
    <text x="146" y="68" font-size="11">z</text>
    <text x="154" y="58" font-size="8">z</text>
  </g>
</svg>
