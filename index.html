<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Little Surprise Is on the Way 👶✨ | Gaurav &amp; Snehal</title>
  <meta name="description" content="Gaurav & Snehal have a joyful announcement. Tap to reveal the surprise!" />

  <!-- Open Graph (absolute URLs so shared links preview correctly) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="A Little Surprise Is on the Way 👶✨" />
  <meta property="og:description" content="Gaurav & Snehal have something wonderful to share. Tap to reveal the surprise!" />
  <meta property="og:url" content="https://baby.gauravwankar.com/" />
  <meta property="og:image" content="https://baby.gauravwankar.com/assets/images/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="A Little Surprise Is on the Way 👶✨" />
  <meta name="twitter:image" content="https://baby.gauravwankar.com/assets/images/og-image.png" />

  <!-- Favicon (relative paths → work on any domain or subpath) -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/images/favicon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <meta name="theme-color" content="#BFDCF0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <noscript>
    <p style="font-family: Georgia, serif; text-align:center; padding:40px 20px; font-size:1.3rem; color:#5C4A5E;">
      Hello Everyone… I am coming soon! 👶✨<br /><br />
      Our little bundle of joy is arriving soon.<br />
      Expected Arrival: 22 January 2027<br /><br />
      With love, Gaurav &amp; Snehal
    </p>
  </noscript>

  <!-- ======= SKY: shared animated backdrop for all scenes ======= -->
  <div class="sky" id="sky" aria-hidden="true">
    <div class="sky-gradient"></div>
    <div class="sun-glow"></div>
    <div class="stars" id="stars"></div>
    <div class="clouds" id="clouds"></div>
    <canvas id="particles" class="particles"></canvas>
    <canvas id="confetti" class="confetti"></canvas>
  </div>

  <main id="app">

    <!-- ======= SCENE 1: Intro & reveal button ======= -->
    <section class="scene scene-intro is-active" id="scene-intro" aria-label="Announcement introduction">
      <div class="banner">
        <div class="banner-glow" aria-hidden="true"></div>
        <div class="banner-frame">
          <!-- Replace assets/images/baby.svg with your own image (baby.png / baby.jpg) -->
          <img src="assets/images/baby.svg" alt="Illustration of a sleeping baby on a crescent moon"
               class="baby-illustration" id="baby-img" />
        </div>
        <div class="bunting" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <h1 class="hello-message">
        <span class="line line-1">Hello Everyone…</span>
        <span class="line line-2">I am coming soon! <span class="emoji">👶✨</span></span>
      </h1>

      <button class="reveal-btn" id="reveal-btn" type="button">
        <span class="reveal-btn-shine" aria-hidden="true"></span>
        Tap to Reveal the Surprise
      </button>
    </section>

    <!-- ======= SCENE 2: Celebration ======= -->
    <section class="scene scene-celebration" id="scene-celebration" aria-label="Family celebration" hidden>
      <h2 class="celebrate-heading">Everyone is over the moon!</h2>
      <div class="balloons" id="balloons" aria-hidden="true"></div>
      <div class="crowd" id="crowd" role="img"
           aria-label="Cartoon family and friends — grandparents, uncles, aunts, cousins, children and close friends — dancing, waving and celebrating"></div>
      <div class="ground" aria-hidden="true"></div>
    </section>

    <!-- ======= SCENE 3: Final message ======= -->
    <section class="scene scene-finale" id="scene-finale" aria-label="Arrival details" hidden>
      <div class="finale-card">
        <p class="finale-lead">Our little bundle of joy is arriving soon</p>
        <div class="finale-divider" aria-hidden="true">✦ ✦ ✦</div>
        <p class="finale-date-label">Expected Arrival</p>
        <p class="finale-date">22 January 2027</p>
        <p class="finale-signature">With love,<br /><span class="names">Gaurav &amp; Snehal</span></p>
      </div>
      <button class="replay-btn" id="replay-btn" type="button">↺ Watch again</button>
    </section>

  </main>

  <!-- ======= Music controls (appear after first tap) ======= -->
  <div class="music-dock" id="music-dock" role="group" aria-label="Music controls" hidden>
    <button id="btn-play" class="dock-btn" type="button" aria-label="Pause music" aria-pressed="true">⏸</button>
    <button id="btn-mute" class="dock-btn" type="button" aria-label="Mute music" aria-pressed="false">🔊</button>
    <label class="volume-wrap">
      <span class="visually-hidden">Volume</span>
      <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6" aria-label="Music volume" />
    </label>
  </div>

  <!-- Replace assets/audio/music.mp3 with your own track -->
  <audio id="music" src="assets/audio/music.mp3" loop preload="none"></audio>

  <script src="js/main.js" defer></script>
</body>
</html>
